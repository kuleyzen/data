<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuleyzen Data | Strategic Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { kuleyzen: { green: '#0b3d0b' } },
                    fontFamily: { sans: ['Inter', 'Arial', 'sans-serif'] }
                }
            }
        }

        const translations = {
            tr: {
                title: "Kuleyzen Data",
                subtitle: "Proje Yönetimi & Outsourcing – Yerel değerlere bağlı.",
                btnAction: "VERİLERİ ANALİZ ET",
                previewTitle: "VERİ ÖNİZLEME",
                btnPdf: "PDF OLARAK İNDİR",
                alertSelect: "Lütfen harita üzerinden bir yer seçin."
            },
            en: {
                title: "Kuleyzen Data",
                subtitle: "Project Management & Outsourcing – Local values.",
                btnAction: "ANALYZE DATA",
                previewTitle: "DATA PREVIEW",
                btnPdf: "DOWNLOAD PDF",
                alertSelect: "Please select a location on the map."
            }
        };

        function setLanguage(lang) {
            window.currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key] || el.innerText;
            });
        }
    </script>

    <style>
        .header-bg { background-color: #0b3d0b; }
        #map { height: 500px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-kuleyzen { background-color: #0b3d0b; color: white; transition: 0.3s; }
        .btn-kuleyzen:hover { background-color: #155a15; }
        .btn-kuleyzen:disabled { background-color: #666; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 font-sans" onload="setLanguage('tr')">

    <header class="header-bg text-white py-12 px-6 text-center shadow-lg relative">
        <div class="absolute top-4 right-4 flex space-x-2">
            <button onclick="setLanguage('tr')" class="text-xs font-bold px-2 py-1 bg-white/10 rounded">TR</button>
            <button onclick="setLanguage('en')" class="text-xs font-bold px-2 py-1 bg-white/10 rounded">EN</button>
        </div>
        <h1 class="text-3xl font-bold tracking-widest uppercase" data-i18n="title">Kuleyzen Data</h1>
        <p class="text-sm italic opacity-80" data-i18n="subtitle">Project Management & Outsourcing</p>
    </header>

    <main class="max-w-7xl mx-auto py-10 px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 bg-white p-6 border rounded-sm shadow-sm h-fit">
                <h2 class="text-[#0b3d0b] font-bold border-b pb-2 mb-6 uppercase text-sm tracking-widest">Analiz Paneli</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Başlangıç Tarihi</label>
                        <input type="date" id="start" value="2020-01-01" class="w-full border-b p-2 outline-none focus:border-kuleyzen-green transition">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Bitiş Tarihi</label>
                        <input type="date" id="end" value="2021-01-01" class="w-full border-b p-2 outline-none focus:border-kuleyzen-green transition">
                    </div>
                    <div class="pt-4">
                        <button onclick="startAnalysis()" id="btnAction" class="w-full btn-kuleyzen py-4 font-bold text-xs uppercase tracking-[0.2em] shadow-md" data-i18n="btnAction">
                            VERİLERİ ANALİZ ET
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="map" class="shadow-md"></div>
            </div>
        </div>

        <div id="previewSection" class="mt-12 hidden bg-white border shadow-lg p-8 rounded-sm">
            <div class="flex justify-between items-center border-b-2 border-[#0b3d0b] pb-4 mb-8">
                <h2 class="text-xl font-bold text-[#0b3d0b] tracking-widest" data-i18n="previewTitle">VERİ ÖNİZLEME</h2>
                <button onclick="generatePDF()" id="btnPdf" class="btn-kuleyzen px-8 py-3 text-[10px] font-bold uppercase tracking-widest shadow-md">
                    <span data-i18n="btnPdf">PDF İNDİR</span>
                </button>
            </div>
            <div id="tableContainer" class="overflow-x-auto text-gray-700"></div>
        </div>
    </main>

    <script>
        // Karte Setup
        const map = L.map('map').setView([39.0, 35.0], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker, coords;

        map.on('click', (e) => {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            coords = e.latlng;
        });

        // WICHTIG: Deine Web-App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxT_Uan3VXPw9K0Geclz6LeZsn1NJgB0l2eherjKkPl_qpm2NbLQ7v86N8YVdSu4zDh8Q/exec';

        async function startAnalysis() {
            if (!coords) return alert(translations[window.currentLang || 'tr'].alertSelect);
            
            const btn = document.getElementById('btnAction');
            btn.innerText = "VERİLER YÜKLENİYOR...";
            btn.disabled = true;

            const payload = {
                action: "getData",
                lat: coords.lat,
                lon: coords.lng,
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                lang: window.currentLang || 'tr'
            };

            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    window.lastData = result.data;
                    renderTable(result.data);
                    document.getElementById('previewSection').classList.remove('hidden');
                    document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("NASA API Hatası: " + result.message);
                }
            } catch (e) {
                alert("Bağlantı Hatası! Lütfen Google Script URL'nizi kontrol edin.");
            } finally {
                btn.innerText = translations[window.currentLang || 'tr'].btnAction;
                btn.disabled = false;
            }
        }

        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            container.innerHTML = `
                <table class="w-full text-left border-collapse">
                    <thead><tr class="bg-gray-100 border-b">
                        <th class="p-4 font-bold uppercase text-[11px]">Parametre</th>
                        <th class="p-4 font-bold uppercase text-[11px]">Analiz Sonucu</th>
                    </tr></thead>
                    <tbody>
                        <tr class="border-b"><td class="p-4 font-semibold">Toplam Yağış (mm)</td><td class="p-4 font-bold text-kuleyzen-green">${data.rain}</td></tr>
                        <tr class="border-b"><td class="p-4 font-semibold">Ortalama Sıcaklık (°C)</td><td class="p-4 font-bold text-kuleyzen-green">${data.temp}</td></tr>
                        <tr class="border-b"><td class="p-4 font-semibold">Lokasyon</td><td class="p-4 text-xs font-mono text-gray-500">${data.lat}, ${data.lon}</td></tr>
                    </tbody>
                </table>`;
        }

        async function generatePDF() {
            if (!window.lastData) return;
            const btn = document.getElementById('btnPdf');
            btn.innerText = "PDF HAZIRLANIYOR...";
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "createPDF", data: window.lastData })
                });
                const result = await response.json();
                if (result.url) window.open(result.url, '_blank');
            } catch (e) {
                alert("PDF oluşturma hatası!");
            } finally {
                btn.innerText = translations[window.currentLang || 'tr'].btnPdf;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
