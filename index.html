<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuleyzen Data | Strategic Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { kuleyzen: { green: '#0b3d0b', light: '#f4f4f4' } },
                    fontFamily: { sans: ['Inter', 'Arial', 'sans-serif'] }
                }
            }
        }

        const translations = {
            tr: {
                title: "Kuleyzen Data", subtitle: "Proje Yönetimi & Outsourcing – Yerel değerlere bağlı, küresel standartlarla yönetilen.",
                navFarm: "Kuleyzen Çiftliği", navConsulting: "Danışmanlık", navData: "Veri Uygulaması",
                panelTitle: "ANALİZ PANELİ", startLabel: "BAŞLANGIÇ TARİHİ", endLabel: "BİTİŞ TARİHİ",
                paramTitle: "VERİ PARAMETRELERİ", paramRain: "Yağış", paramTemp: "Sıcaklık",
                paramSun: "Güneşlenme", paramWind: "Rüzgar Hızı", compareLabel: "Karşılaştırma Modu",
                btnAction: "VERİLERİ ANALİZ ET", previewTitle: "VERİ ÖNİZLEME", btnPdf: "PDF OLARAK İNDİR",
                alertSelect: "Lütfen harita üzerinden bir yer seçin.", footer: "Kuleyzen Data © 2026 – Altınözü, Türkiye",
                loadingData: "NASA VERİLERİ YÜKLENİYOR...", loadingPdf: "PDF HAZIRLANIYOR...", 
                errorPdf: "PDF Hatası! Lütfen tekrar deneyin.", errorConn: "Bağlantı Hatası! Lütfen sayfayı yenileyin.",
                tblParam: "Parametre", tblLocA: "Lokasyon A", tblLocB: "Lokasyon B",
                tblRain: "Toplam Yağış (mm)", tblTemp: "Ortalama Sıcaklık (°C)", tblSun: "Güneşlenme (kWh/m²)", tblWind: "Rüzgar Hızı (m/s)",
                tblMatrixRain: "Aylık Yağış Tablosu (mm)", tblMatrixTemp: "Aylık Sıcaklık Tablosu (°C)", 
                tblMatrixSun: "Aylık Güneşlenme Tablosu (kWh/m²)", tblMatrixWind: "Aylık Rüzgar Hızı Tablosu (m/s)",
                tblAvg: "ORTALAMA", tblYear: "Yıl", tblTotalAvg: "Top/Ort"
            },
            en: {
                title: "Kuleyzen Data", subtitle: "Project Management & Outsourcing – Global Standards.",
                navFarm: "Kuleyzen Farm", navConsulting: "Consulting", navData: "Data App",
                panelTitle: "ANALYSIS PANEL", startLabel: "START DATE", endLabel: "END DATE",
                paramTitle: "DATA PARAMETERS", paramRain: "Precipitation", paramTemp: "Temperature",
                paramSun: "Insolation", paramWind: "Wind Speed", compareLabel: "Comparison Mode",
                btnAction: "ANALYZE DATA", previewTitle: "DATA PREVIEW", btnPdf: "DOWNLOAD PDF",
                alertSelect: "Please select a location on the map.", footer: "Kuleyzen Data © 2026 – Altınözü, Turkey",
                loadingData: "LOADING NASA DATA...", loadingPdf: "PREPARING PDF...", 
                errorPdf: "PDF Error! Please try again.", errorConn: "Connection Error! Please refresh the page.",
                tblParam: "Parameter", tblLocA: "Location A", tblLocB: "Location B",
                tblRain: "Total Rain (mm)", tblTemp: "Avg. Temperature (°C)", tblSun: "Insolation (kWh/m²)", tblWind: "Wind Speed (m/s)",
                tblMatrixRain: "Monthly Rain Matrix (mm)", tblMatrixTemp: "Monthly Temp Matrix (°C)", 
                tblMatrixSun: "Monthly Insolation Matrix (kWh/m²)", tblMatrixWind: "Monthly Wind Matrix (m/s)",
                tblAvg: "AVERAGE", tblYear: "Year", tblTotalAvg: "Total/Avg"
            },
            de: {
                title: "Kuleyzen Data", subtitle: "Projektmanagement & Outsourcing – Lokale Werte.",
                navFarm: "Kuleyzen Çiftliği", navConsulting: "Beratung", navData: "Daten-App",
                panelTitle: "ANALYSE-PANEL", startLabel: "STARTDATUM", endLabel: "ENDDATUM",
                paramTitle: "DATEN-PARAMETER", paramRain: "Niederschlag", paramTemp: "Temperatur",
                paramSun: "Sonneneinstrahlung", paramWind: "Windgeschwindigkeit", compareLabel: "Vergleichsmodus",
                btnAction: "DATEN ANALYSIEREN", previewTitle: "DATEN-VORSCHAU", btnPdf: "PDF HERUNTERLADEN",
                alertSelect: "Bitte wählen Sie einen Standort auf der Karte.", footer: "Kuleyzen Data © 2026 – Altınözü, Türkei",
                loadingData: "NASA DATEN WERDEN GELADEN...", loadingPdf: "PDF WIRD ERSTELLT...", 
                errorPdf: "PDF-Fehler! Bitte erneut versuchen.", errorConn: "Verbindungsfehler! Bitte Seite neu laden.",
                tblParam: "Parameter", tblLocA: "Standort A", tblLocB: "Standort B",
                tblRain: "Niederschlag (mm)", tblTemp: "Ø Temperatur (°C)", tblSun: "Sonneneinstrahlung (kWh/m²)", tblWind: "Windgeschwindigkeit (m/s)",
                tblMatrixRain: "Monatl. Niederschlagsmatrix (mm)", tblMatrixTemp: "Monatl. Temperaturmatrix (°C)", 
                tblMatrixSun: "Monatl. Sonneneinstrahlungsmatrix (kWh/m²)", tblMatrixWind: "Monatl. Windmatrix (m/s)",
                tblAvg: "DURCHSCHNITT", tblYear: "Jahr", tblTotalAvg: "Gesamt/Ø"
            }
        };

        const monthNames = {
            tr: ["Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"],
            en: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
            de: ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"]
        };

        function setLanguage(lang) {
            window.currentLang = lang;
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[key]) el.innerText = t[key];
            });
            if (window.lastReportData) renderTable(window.lastReportData);
        }
    </script>

    <style>
        .header-bg { background-color: #0b3d0b; }
        #map { height: 500px; border: 1px solid #ddd; z-index: 1; }
        .btn-kuleyzen { background-color: #0b3d0b; color: white; transition: all 0.3s; }
        .btn-kuleyzen:hover { background-color: #155a15; }
        .btn-kuleyzen:disabled { background-color: #4b634b; cursor: not-allowed; }
        .marker-b { filter: hue-rotate(140deg); }
        .lang-btn { cursor: pointer; padding: 4px 10px; font-size: 11px; font-weight: bold; color: white; opacity: 0.8; transition: 0.2s; }
        .lang-btn:hover { opacity: 1; background-color: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="font-sans text-gray-800 bg-gray-50" onload="setLanguage('tr')">

    <header class="header-bg text-white pt-6 pb-12 px-6 relative shadow-md">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-end items-start mb-6 md:mb-10">
                <div class="flex flex-col items-end space-y-4">
                    <img src="logo.png" alt="Logo" class="h-12 md:h-14 w-auto bg-white p-1 rounded shadow">
                    <div class="flex space-x-1 bg-black/20 p-1 rounded">
                        <span class="lang-btn" onclick="setLanguage('tr')">TR</span>
                        <span class="lang-btn" onclick="setLanguage('de')">DE</span>
                        <span class="lang-btn" onclick="setLanguage('en')">EN</span>
                    </div>
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-3xl md:text-5xl font-bold tracking-widest uppercase drop-shadow-md" data-i18n="title">Kuleyzen Data</h1>
                <p class="text-xs md:text-sm mt-4 italic opacity-90 max-w-xl mx-auto leading-relaxed" data-i18n="subtitle">Proje Yönetimi & Outsourcing – Yerel değerlere bağlı, küresel standartlarla yönetilen.</p>
            </div>
        </div>
    </header>

    <nav class="bg-white py-3 px-2 text-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex justify-center space-x-4 md:space-x-8 text-[10px] md:text-xs font-bold uppercase tracking-widest">
            <a href="https://kuleyzen.com" class="text-kuleyzen-green hover:opacity-70" data-i18n="navFarm">Kuleyzen Çiftliği</a>
            <a href="https://consulting.kuleyzen.com" class="text-kuleyzen-green hover:opacity-70" data-i18n="navConsulting">Danışmanlık</a>
            <a href="#" class="text-kuleyzen-green border-b-2 border-kuleyzen-green pb-1" data-i18n="navData">Veri Uygulaması</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4 md:px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 border shadow-sm rounded-sm">
                    <h2 class="text-md font-bold text-kuleyzen-green border-b pb-2 mb-4 uppercase tracking-wider" data-i18n="panelTitle">Analiz Paneli</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase" data-i18n="startLabel">Başlangıç</label>
                            <input type="date" id="startDate" value="2018-01-01" class="w-full border-b p-2 outline-none focus:border-kuleyzen-green bg-gray-50">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase" data-i18n="endLabel">Bitiş</label>
                            <input type="date" id="endDate" value="2024-12-31" class="w-full border-b p-2 outline-none focus:border-kuleyzen-green bg-gray-50">
                        </div>
                        <div class="pt-2">
                            <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block" data-i18n="paramTitle">Parametreler</label>
                            <div class="grid grid-cols-2 gap-3 text-xs">
                                <label class="flex items-center"><input type="checkbox" id="pRain" checked class="mr-2 w-4 h-4"> <span data-i18n="paramRain">Yağış</span></label>
                                <label class="flex items-center"><input type="checkbox" id="pTemp" checked class="mr-2 w-4 h-4"> <span data-i18n="paramTemp">Sıcaklık</span></label>
                                <label class="flex items-center"><input type="checkbox" id="pSun" checked class="mr-2 w-4 h-4"> <span data-i18n="paramSun">Güneş</span></label>
                                <label class="flex items-center"><input type="checkbox" id="pWind" class="mr-2 w-4 h-4"> <span data-i18n="paramWind">Rüzgar</span></label>
                            </div>
                        </div>
                        <div class="py-4 border-t mt-2">
                            <label class="flex items-center text-xs cursor-pointer group font-semibold text-gray-700">
                                <input type="checkbox" id="compareMode" class="mr-2 w-4 h-4 text-kuleyzen-green"> <span class="group-hover:text-kuleyzen-green transition" data-i18n="compareLabel">Karşılaştırma Modu</span>
                            </label>
                        </div>
                        <button onclick="startAnalysis()" id="btnAction" class="w-full btn-kuleyzen py-4 font-bold text-xs md:text-sm uppercase tracking-widest shadow-md rounded-sm" data-i18n="btnAction">VERİLERİ ANALİZ ET</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="map" class="shadow-sm rounded-sm"></div>
            </div>
        </div>

        <div id="previewSection" class="mt-10 hidden bg-white border shadow-sm p-6 md:p-8 rounded-sm">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-2 border-kuleyzen-green pb-4 mb-6">
                <h2 class="text-xl font-bold text-kuleyzen-green uppercase tracking-widest" data-i18n="previewTitle">VERİ ÖNİZLEME</h2>
                <button onclick="generatePDF()" id="btnPdf" class="mt-4 md:mt-0 w-full md:w-auto btn-kuleyzen px-8 py-3 text-[10px] font-bold uppercase tracking-widest shadow-md rounded-sm">
                    <span data-i18n="btnPdf">PDF İNDİR</span>
                </button>
            </div>
            
            <div id="previewTableContainer" class="overflow-x-auto text-gray-700 mb-10"></div>
        </div>
    </main>

    <footer class="bg-gray-100 py-12 text-center border-t mt-12">
        <p class="text-[10px] md:text-[11px] text-gray-500 tracking-[0.2em] uppercase" data-i18n="footer">Kuleyzen Data © 2026 – Altınözü, Türkiye</p>
    </footer>

    <script>
        const map = L.map('map').setView([39.0, 35.0], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let markerA, markerB, coordsA, coordsB;
        let isCompare = false;

        document.getElementById('compareMode').onchange = (e) => {
            isCompare = e.target.checked;
            if (!isCompare && markerB) { map.removeLayer(markerB); markerB = null; coordsB = null; }
        };

        map.on('click', (e) => {
            if (!isCompare || !markerA) {
                if (markerA) map.removeLayer(markerA);
                markerA = L.marker(e.latlng).addTo(map);
                coordsA = e.latlng;
            } else {
                if (markerB) map.removeLayer(markerB);
                markerB = L.marker(e.latlng).addTo(map);
                markerB._icon.classList.add('marker-b');
                coordsB = e.latlng;
            }
        });

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysECNvTpHu8hb0RbhEUtyw1jDJ_CUvOx20SIx45Z3NKcbYmm3GJGWvlIIWFRqZieY1/exec';

        async function getPlaceName(lat, lon, lang) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=${lang}`);
                const data = await res.json();
                if (data && data.address) {
                    return data.address.city || data.address.town || data.address.village || data.address.county || data.address.province || "Bilinmeyen Konum";
                }
            } catch(e) { console.warn("Geocoding failed", e); }
            return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
        }

        async function startAnalysis() {
            const t = translations[window.currentLang || 'tr'];
            if (!coordsA) return alert(t.alertSelect);

            const btn = document.getElementById('btnAction');
            const originalText = btn.innerText;
            btn.innerText = t.loadingData;
            btn.disabled = true;

            const nameA = await getPlaceName(coordsA.lat, coordsA.lng, window.currentLang || 'tr');
            let nameB = null;
            if (isCompare && coordsB) {
                nameB = await getPlaceName(coordsB.lat, coordsB.lng, window.currentLang || 'tr');
            }

            const payload = {
                action: "getData",
                lang: window.currentLang || 'tr',
                start: document.getElementById('startDate').value,
                end: document.getElementById('endDate').value,
                latA: coordsA.lat, lonA: coordsA.lng,
                nameA: nameA, 
                nameB: nameB,
                isCompare: isCompare,
                latB: isCompare ? coordsB.lat : null,
                lonB: isCompare ? coordsB.lng : null,
                params: {
                    rain: document.getElementById('pRain').checked, temp: document.getElementById('pTemp').checked,
                    sun: document.getElementById('pSun').checked, wind: document.getElementById('pWind').checked
                }
            };

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                
                if(result.status === "success") {
                    result.data.params = payload.params; 
                    window.lastReportData = result.data;
                    renderTable(result.data);
                    document.getElementById('previewSection').classList.remove('hidden');
                    document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
                } else { alert("Backend Error: " + result.message); }
            } catch(e) { console.error(e); alert(t.errorConn); } 
            finally { btn.innerText = t.btnAction; btn.disabled = false; }
        }

        function buildMatrixHtml(matrixData, title, locationName, t, mNames) {
            if (!matrixData || !matrixData.rows || matrixData.rows.length === 0) return '';
            let html = `<h3 class="mt-8 text-sm font-bold text-kuleyzen-green uppercase border-b pb-2 mb-4">${title} (${locationName})</h3>
                <div class="overflow-x-auto mb-6">
                    <table class="w-full text-right text-xs border-collapse border border-gray-200">
                        <thead>
                            <tr class="bg-kuleyzen-green text-white">
                                <th class="p-2 border text-center">${t.tblYear}</th>
                                <th class="p-2 border text-center">${t.tblTotalAvg}</th>
                                ${mNames.map(month => `<th class="p-2 border text-center">${month}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>`;

            matrixData.rows.forEach(row => {
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-2 border font-bold text-center bg-gray-100">${row.year}</td>
                    <td class="p-2 border font-bold bg-gray-50">${row.total}</td>
                    ${row.months.map(val => `<td class="p-2 border">${val}</td>`).join('')}
                </tr>`;
            });

            html += `<tr class="bg-gray-200 font-bold">
                <td class="p-2 border text-center">${t.tblAvg}</td>
                <td class="p-2 border">${matrixData.avgYearly}</td>
                ${matrixData.bottomAverages.map(val => `<td class="p-2 border text-blue-700">${val}</td>`).join('')}
            </tr>`;

            html += `</tbody></table></div>`;
            return html;
        }

        function renderTable(data) {
            const t = translations[window.currentLang || 'tr'];
            const mNames = monthNames[window.currentLang || 'tr'];
            const container = document.getElementById('previewTableContainer');
            
            // 1. ZUSAMMENFASSUNGSTABELLE
            let html = `<table class="w-full text-left text-sm border-collapse bg-white border border-gray-100">
                <thead><tr class="bg-gray-100 border-b">
                    <th class="p-4 border-r font-bold text-gray-500 uppercase tracking-tighter">${t.tblParam}</th>
                    <th class="p-4 border-r font-bold text-kuleyzen-green uppercase tracking-tighter">${data.nameA}</th>
                    ${data.isCompare ? `<th class="p-4 font-bold text-green-700 uppercase tracking-tighter">${data.nameB}</th>` : ''}
                </tr></thead><tbody>`;
            
            if(data.a.rain) html += `<tr class="border-b hover:bg-gray-50"><td class="p-4 border-r font-medium">${t.tblRain}</td><td class="p-4 border-r font-bold text-blue-600">${data.a.rain}</td>${data.isCompare ? `<td class="p-4 font-bold text-blue-800">${data.b.rain}</td>` : ''}</tr>`;
            if(data.a.tempAvg) html += `<tr class="border-b hover:bg-gray-50"><td class="p-4 border-r font-medium">${t.tblTemp}</td><td class="p-4 border-r font-bold text-red-500">${data.a.tempAvg}</td>${data.isCompare ? `<td class="p-4 font-bold text-red-700">${data.b.tempAvg}</td>` : ''}</tr>`;
            if(data.a.sun) html += `<tr class="border-b hover:bg-gray-50"><td class="p-4 border-r font-medium">${t.tblSun}</td><td class="p-4 border-r font-bold text-yellow-500">${data.a.sun}</td>${data.isCompare ? `<td class="p-4 font-bold text-yellow-600">${data.b.sun}</td>` : ''}</tr>`;
            if(data.a.wind) html += `<tr class="border-b hover:bg-gray-50"><td class="p-4 border-r font-medium">${t.tblWind}</td><td class="p-4 border-r font-bold text-gray-500">${data.a.wind}</td>${data.isCompare ? `<td class="p-4 font-bold text-gray-700">${data.b.wind}</td>` : ''}</tr>`;
            html += `</tbody></table>`;

            // 2. MONATS-MATRIZEN (Dynamisch basierend auf Checkboxen)
            let matrixHtml = `<div class="mt-8">`;
            
            if (data.params.rain) {
                matrixHtml += buildMatrixHtml(data.a.matrices.rain, t.tblMatrixRain, data.nameA, t, mNames);
                if (data.isCompare && data.b) matrixHtml += buildMatrixHtml(data.b.matrices.rain, t.tblMatrixRain, data.nameB, t, mNames);
            }
            if (data.params.temp) {
                matrixHtml += buildMatrixHtml(data.a.matrices.temp, t.tblMatrixTemp, data.nameA, t, mNames);
                if (data.isCompare && data.b) matrixHtml += buildMatrixHtml(data.b.matrices.temp, t.tblMatrixTemp, data.nameB, t, mNames);
            }
            if (data.params.sun) {
                matrixHtml += buildMatrixHtml(data.a.matrices.sun, t.tblMatrixSun, data.nameA, t, mNames);
                if (data.isCompare && data.b) matrixHtml += buildMatrixHtml(data.b.matrices.sun, t.tblMatrixSun, data.nameB, t, mNames);
            }
            if (data.params.wind) {
                matrixHtml += buildMatrixHtml(data.a.matrices.wind, t.tblMatrixWind, data.nameA, t, mNames);
                if (data.isCompare && data.b) matrixHtml += buildMatrixHtml(data.b.matrices.wind, t.tblMatrixWind, data.nameB, t, mNames);
            }
            
            matrixHtml += `</div>`;
            container.innerHTML = html + matrixHtml;
        }

        async function generatePDF() {
            const t = translations[window.currentLang || 'tr'];
            if (!window.lastReportData) return;
            
            const btn = document.getElementById('btnPdf');
            btn.innerText = t.loadingPdf;
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "createPDF", data: window.lastReportData }) });
                const result = await response.json();
                if(result.url) window.open(result.url, '_blank');
            } catch(e) { alert(t.errorPdf); } 
            finally { btn.innerText = t.btnPdf; btn.disabled = false; }
        }
    </script>
</body>
</html>
