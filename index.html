                tblAvg: "ORTALAMA",

            en: {

                navFarm: "Kuleyzen Farm",

                errorPdf: "PDF-Fehler! Bitte erneut versuchen.", 
                errorConn: "Verbindungsfehler! Bitte Seite neu laden.",

                tblLocA: "Standort A",

                tblAvg: "DURCHSCHNITT",

                tblTotalAvg: "Gesamt/Ø"

        const monthNames = {
            tr: ["Oca", "Şub", "Mar", "Nis", "May", "Haz", "Tem", "Ağu", "Eyl", "Eki", "Kas", "Ara"],
            en: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
            de: ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"]
        };

        function setLanguage(lang) {
            window.currentLang = lang;
            const t = translations[lang];
            
            const sel = document.getElementById('langSelector');
            if(sel) {
                sel.value = lang;
            }

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[key]) {
                    el.innerText = t[key];
                }
            });
            
            if (window.lastReportData) {
                renderTable(window.lastReportData);
            }
        }
    </script>

        }

            background-color: #155a15; 
        }
        .btn-kuleyzen:disabled { 
            background-color: #4b634b; 
            cursor: not-allowed; 
        }
        .marker-b { 
            filter: hue-rotate(140deg); 
        }

<body class="font-sans text-gray-800 bg-gray-50" onload="setLanguage('tr')">

    <header class="header-bg text-white pt-6 pb-12 px-6 relative shadow-md">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-end items-start mb-6 md:mb-10">
                <div class="flex flex-col items-end space-y-4">
                    <img src="logo.png" alt="Logo" class="h-12 md:h-14 w-auto bg-white p-1 rounded shadow">
                    
                    <div class="relative inline-block w-32">
                        <select id="langSelector" onchange="setLanguage(this.value)" class="block w-full bg-white/20 hover:bg-white/30 text-white text-xs font-bold py-2 px-3 pr-8 rounded outline-none cursor-pointer appearance-none border border-white/30 transition shadow-sm">
                            <option value="tr" class="text-gray-800">🇹🇷 Türkçe</option>
                            <option value="de" class="text-gray-800">🇩🇪 Deutsch</option>
                            <option value="en" class="text-gray-800">🇬🇧 English</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-white">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>

            </div>

                <h1 class="text-3xl md:text-5xl font-bold tracking-widest uppercase drop-shadow-md" data-i18n="title">Kuleyzen Data</h1>
                <p class="text-xs md:text-sm mt-4 italic opacity-90 max-w-xl mx-auto leading-relaxed" data-i18n="subtitle">Proje Yönetimi & Outsourcing – Yerel değerlere bağlı, küresel standartlarla yönetilen.</p>
            </div>
        </div>
    </header>

    <nav class="bg-white py-3 px-2 text-center border-b sticky top-0 z-50 shadow-sm">
        <div class="flex justify-center space-x-4 md:space-x-8 text-[10px] md:text-xs font-bold uppercase tracking-widest">
            <a href="https://kuleyzen.com" class="text-kuleyzen-green hover:opacity-70" data-i18n="navFarm">Kuleyzen Çiftliği</a>
            <a href="https://consulting.kuleyzen.com" class="text-kuleyzen-green hover:opacity-70" data-i18n="navConsulting">Danışmanlık</a>
            <a href="#" class="text-kuleyzen-green border-b-2 border-kuleyzen-green pb-1" data-i18n="navData">Veri Uygulaması</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4 md:px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 border shadow-sm rounded-sm">
                    <h2 class="text-md font-bold text-kuleyzen-green border-b pb-2 mb-4 uppercase tracking-wider" data-i18n="panelTitle">Analiz Paneli</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase" data-i18n="startLabel">Başlangıç</label>
                            <input type="date" id="startDate" value="2018-01-01" class="w-full border-b p-2 outline-none focus:border-kuleyzen-green bg-gray-50">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase" data-i18n="endLabel">Bitiş</label>

                        </div>

                                </label>
                                <label class="flex items-center">
                                    <input type="checkbox" id="pSun" checked class="mr-2 w-4 h-4"> 
                                    <span data-i18n="paramSun">Güneş</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="checkbox" id="pWind" class="mr-2 w-4 h-4"> 
                                    <span data-i18n="paramWind">Rüzgar</span>
                                </label>
                            </div>

                        <div class="py-4 border-t mt-2">

                                <input type="checkbox" id="compareMode" class="mr-2 w-4 h-4 text-kuleyzen-green"> 
                                <span class="group-hover:text-kuleyzen-green transition" data-i18n="compareLabel">Karşılaştırma Modu</span>
                            </label>
                        </div>
                        <button onclick="startAnalysis()" id="btnAction" class="w-full btn-kuleyzen py-4 font-bold text-xs md:text-sm uppercase tracking-widest shadow-md rounded-sm" data-i18n="btnAction">VERİLERİ ANALİZ ET</button>

        <div id="previewSection" class="mt-10 hidden bg-white border shadow-sm p-6 md:p-8 rounded-sm">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-2 border-kuleyzen-green pb-4 mb-6">
                <h2 class="text-xl font-bold text-kuleyzen-green uppercase tracking-widest" data-i18n="previewTitle">VERİ ÖNİZLEME</h2>
                <button onclick="generatePDF()" id="btnPdf" class="mt-4 md:mt-0 w-full md:w-auto btn-kuleyzen px-8 py-3 text-[10px] font-bold uppercase tracking-widest shadow-md rounded-sm">
                    <span data-i18n="btnPdf">PDF İNDİR</span>
                </button>
            </div>
            
            <div id="previewTableContainer" class="text-gray-700 mb-10"></div>
        </div>
    </main>

    <footer class="bg-gray-100 py-12 text-center border-t mt-12">
        <p class="text-[10px] md:text-[11px] text-gray-500 tracking-[0.2em] uppercase" data-i18n="footer">Kuleyzen Data © 2026 – Altınözü, Türkiye</p>
    </footer>

    <script>
        const map = L.map('map').setView([39.0, 35.0], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let markerA, markerB, coordsA, coordsB;
        let isCompare = false;

        document.getElementById('compareMode').onchange = (e) => {
            isCompare = e.target.checked;
            if (!isCompare && markerB) { 
                map.removeLayer(markerB); 
                markerB = null; 
                coordsB = null; 
            }
        };

        map.on('click', (e) => {
            if (!isCompare || !markerA) {
                if (markerA) {
                    map.removeLayer(markerA);
                }
                markerA = L.marker(e.latlng).addTo(map);
                coordsA = e.latlng;
            } else {
                if (markerB) {
                    map.removeLayer(markerB);
                }
                markerB = L.marker(e.latlng).addTo(map);
                markerB._icon.classList.add('marker-b');
                coordsB = e.latlng;
            }
        });

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxG4yPcGPkIjk6sHr8U0ZkAihmde6MD-O2eUxt75mB4Zq9l7bsD5VAweAmRKGQqBSNoGQ/exec';

        async function getPlaceName(lat, lon, lang) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=14&accept-language=${lang}`);
                const data = await res.json();
                
                if (data && data.address) {
                    const a = data.address;
                    const localName = a.neighbourhood || a.suburb || a.village || a.hamlet || a.town || a.city_district;
                    const districtName = a.town || a.district || a.county || a.city;
                    
                    if (localName && districtName && localName !== districtName) {
                        return `${localName}, ${districtName}`;
                    } else if (localName) {
                        return localName;
                    } else if (districtName) {
                        return districtName;
                    } else {
                        return a.state || a.province || "Bilinmeyen Konum";
                    }
                }
            } catch(e) { 
                console.warn("Geocoding failed", e); 
            }
            return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
        }

        async function startAnalysis() {
            const t = translations[window.currentLang || 'tr'];
            if (!coordsA) {
                return alert(t.alertSelect);
            }

            const btn = document.getElementById('btnAction');
            btn.innerText = t.loadingData;
            btn.disabled = true;

            const nameA = await getPlaceName(coordsA.lat, coordsA.lng, window.currentLang || 'tr');
            let nameB = null;
            
            if (isCompare && coordsB) {
                nameB = await getPlaceName(coordsB.lat, coordsB.lng, window.currentLang || 'tr');
            }

            const payload = {
                action: "getData",
                lang: window.currentLang || 'tr',
                start: document.getElementById('startDate').value,
                end: document.getElementById('endDate').value,
                latA: coordsA.lat, 
                lonA: coordsA.lng,
                nameA: nameA, 
                nameB: nameB,
                isCompare: isCompare,
                latB: isCompare ? coordsB.lat : null,
                lonB: isCompare ? coordsB.lng : null,
                params: {
                    rain: document.getElementById('pRain').checked, 
                    temp: document.getElementById('pTemp').checked,
                    sun: document.getElementById('pSun').checked, 
                    wind: document.getElementById('pWind').checked
                }
            };

            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await response.json();
                
                if(result.status === "success") {
                    result.data.params = payload.params; 
                    window.lastReportData = result.data;
                    renderTable(result.data);
                    document.getElementById('previewSection').classList.remove('hidden');
                    document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
                } else { 
                    alert("Backend Error: " + result.message); 
                }
            } catch(e) { 
                console.error(e); 
                alert(t.errorConn); 
            } finally { 
                btn.innerText = t.btnAction; 
                btn.disabled = false; 
            }
        }

        function buildMatrixHtml(matrixData, title, locationName, t, mNames) {
            if (!matrixData || !matrixData.rows || matrixData.rows.length === 0) {
                return '';
            }
            
            let html = `
                <h3 class="mt-4 text-sm font-bold text-kuleyzen-green uppercase border-b pb-2 mb-4">${title} (${locationName})</h3>
                <div class="overflow-x-auto w-full">
                    <table class="w-full text-right text-[10px] sm:text-xs border-collapse border border-gray-200">
                        <thead>
                            <tr class="bg-kuleyzen-green text-white">
                                <th class="p-1 sm:p-2 border text-center">${t.tblYear}</th>
                                <th class="p-1 sm:p-2 border text-center">${t.tblTotalAvg}</th>`;
            
            mNames.forEach(month => {
                html += `<th class="p-1 sm:p-2 border text-center">${month}</th>`;
            });
            
            html += `
                            </tr>
                        </thead>
                        <tbody>`;

            matrixData.rows.forEach(row => {
                html += `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-1 sm:p-2 border font-bold text-center bg-gray-100">${row.year}</td>
                    <td class="p-1 sm:p-2 border font-bold bg-gray-50">${row.total}</td>`;
                
                row.months.forEach(val => {
                    let colorClass = "";
                    if (title.includes("Yağış") || title.includes("Rain") || title.includes("Niederschlag")) {
                        if(val !== "-" && val !== "0.0") {
                            let v = parseFloat(val);
                            if (v > 150) {
                                colorClass = "bg-blue-600 text-white font-bold";
                            } else if (v >= 50) {
                                colorClass = "bg-blue-200 text-black font-bold";
                            } else if (v >= 10) {
                                colorClass = "bg-blue-50 text-black";
                            } else {
                                colorClass = "bg-yellow-50 text-black";
                            }
                        }
                    }
                    html += `<td class="p-1 sm:p-2 border ${colorClass}">${val}</td>`;
                });
                
                html += `</tr>`;
            });

            html += `
            <tr class="bg-gray-200 font-bold">
                <td class="p-1 sm:p-2 border text-center">${t.tblAvg}</td>
                <td class="p-1 sm:p-2 border">${matrixData.avgYearly}</td>`;
            
            matrixData.bottomAverages.forEach(val => {
                html += `<td class="p-1 sm:p-2 border text-blue-700">${val}</td>`;
            });
            
            html += `
            </tr>
            </tbody>
        </table>
        </div>`;
            
            return html;
        }

        function renderTable(data) {
            const t = translations[window.currentLang || 'tr'];
            const mNames = monthNames[window.currentLang || 'tr'];
            const container = document.getElementById('previewTableContainer');
            
            let html = `
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse bg-white border border-gray-100 min-w-[500px]">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-4 border-r font-bold text-gray-500 uppercase tracking-tighter">${t.tblParam}</th>
                            <th class="p-4 border-r font-bold text-kuleyzen-green uppercase tracking-tighter">${data.nameA}</th>`;
            
            if (data.isCompare) {
                html += `<th class="p-4 font-bold text-green-700 uppercase tracking-tighter">${data.nameB}</th>`;
            }
            
            html += `
                        </tr>
                    </thead>
                    <tbody>`;
            
            if (data.a.rain) {
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-4 border-r font-medium">${t.tblRain}</td>
                    <td class="p-4 border-r font-bold text-blue-600">${data.a.rain}</td>`;
                if (data.isCompare) {
                    html += `<td class="p-4 font-bold text-blue-800">${data.b.rain}</td>`;
                }
                html += `</tr>`;
            }
            
            if (data.a.tempAvg) {
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-4 border-r font-medium">${t.tblTemp}</td>
                    <td class="p-4 border-r font-bold text-red-500">${data.a.tempAvg}</td>`;
                if (data.isCompare) {
                    html += `<td class="p-4 font-bold text-red-700">${data.b.tempAvg}</td>`;
                }
                html += `</tr>`;
            }
            
            if (data.a.sun) {
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-4 border-r font-medium">${t.tblSun}</td>
                    <td class="p-4 border-r font-bold text-yellow-500">${data.a.sun}</td>`;
                if (data.isCompare) {
                    html += `<td class="p-4 font-bold text-yellow-600">${data.b.sun}</td>`;
                }
                html += `</tr>`;
            }
            
            if (data.a.wind) {
                html += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-4 border-r font-medium">${t.tblWind}</td>
                    <td class="p-4 border-r font-bold text-gray-500">${data.a.wind}</td>`;
                if (data.isCompare) {
                    html += `<td class="p-4 font-bold text-gray-700">${data.b.wind}</td>`;
                }
                html += `</tr>`;
            }
            
            html += `
                    </tbody>
                </table>
            </div>`;

            let matrixHtml = `<div class="mt-10 space-y-12">`;
            
            function buildPairHtml(title, matA, matB, nameA, nameB) {
                let gridClass = data.isCompare ? "grid grid-cols-1 xl:grid-cols-2 gap-6" : "grid grid-cols-1";
                let pairHtml = `<div class="${gridClass}">`;
                pairHtml += `<div>${buildMatrixHtml(matA, title, nameA, t, mNames)}</div>`;
                if (data.isCompare && matB) {
                    pairHtml += `<div>${buildMatrixHtml(matB, title, nameB, t, mNames)}</div>`;
                }
                pairHtml += `</div>`;
                return pairHtml;
            }

            if (data.params.rain) {
                matrixHtml += buildPairHtml(t.tblMatrixRain, data.a.matrices.rain, data.isCompare ? data.b.matrices.rain : null, data.nameA, data.nameB);
            }
            if (data.params.temp) {
                matrixHtml += buildPairHtml(t.tblMatrixTemp, data.a.matrices.temp, data.isCompare ? data.b.matrices.temp : null, data.nameA, data.nameB);
            }
            if (data.params.sun) {
                matrixHtml += buildPairHtml(t.tblMatrixSun, data.a.matrices.sun, data.isCompare ? data.b.matrices.sun : null, data.nameA, data.nameB);
            }
            if (data.params.wind) {
                matrixHtml += buildPairHtml(t.tblMatrixWind, data.a.matrices.wind, data.isCompare ? data.b.matrices.wind : null, data.nameA, data.nameB);
            }
            
            matrixHtml += `</div>`;
            container.innerHTML = html + matrixHtml;
        }

        async function generatePDF() {
            const t = translations[window.currentLang || 'tr'];
            if (!window.lastReportData) {
                return;
            }
            
            const btn = document.getElementById('btnPdf');
            btn.innerText = t.loadingPdf;
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: "createPDF", 
                        data: window.lastReportData 
                    }) 
                });
                const result = await response.json();
                if(result.url) {
                    window.open(result.url, '_blank');
                }
            } catch(e) { 
                alert(t.errorPdf); 
            } finally { 
                btn.innerText = t.btnPdf; 
                btn.disabled = false; 
            }
        }
    </script>
</body>
</html>
